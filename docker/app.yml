services:
 fws-app:
  container_name: fws-app
  build:
    context: ..
    target: development
  ports:
    - "3000:3000"
    - "9229:9229"
  env_file:
    - .env
  depends_on:
    fws-app-redis:
      condition: service_healthy
  networks:
    - default
    - localstack
  volumes:
    - ../:/home/node/app
    - /home/node/app/node_modules # Avoid overwriting node_modules
    - /home/node/app/coverage # Exclude coverage reports from the host
  deploy:
    restart_policy:
      condition: on-failure

networks:
  localstack:
    external: true
    name: docker_ls
